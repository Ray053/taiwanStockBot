version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: stockbot_postgres
    environment:
      POSTGRES_USER: stockbot
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stockbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockbot -d stockbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stockbot_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockbot_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockbot_scheduler
    command: python scheduler_main.py
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app

  pgadmin:
    image: dpage/pgadmin4
    container_name: stockbot_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stockbot.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
